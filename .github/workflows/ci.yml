name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Annule les runs précédents sur la même branche.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Typecheck & Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      # --ignore-scripts évite le postinstall Prisma (téléchargement binaire)
      # non nécessaire pour le typecheck/build de la bêta.
      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Build
        run: npm run build
        env:
          # Build sans Supabase : le fallback localStorage prend le relais.
          NEXT_TELEMETRY_DISABLED: "1"
